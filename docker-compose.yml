services:
  postgres:
    image: postgres:16-alpine
    container_name: odyssey-postgres
    environment:
      POSTGRES_USER: odyssey
      POSTGRES_PASSWORD: odyssey
      POSTGRES_DB: odyssey
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odyssey"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - odyssey-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: odyssey-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - odyssey-network

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: odyssey-server
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://odyssey:odyssey@postgres:5432/odyssey
      DEBUG: "True"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./server:/app
      - /app/__pycache__
    networks:
      - odyssey-network

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: odyssey-client
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app
      - /app/node_modules
    depends_on:
      - server
    networks:
      - odyssey-network

volumes:
  postgres_data:
  pgadmin_data:

networks:
  odyssey-network:
    driver: bridge
